<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Tienda - Pants</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="../index.html" class="logo">🏆 TIENDA CHAMPION</a>
            <nav>
                    <a href="../index.html">Inicio</a>
                    <a href="../playeras/playeras.html">Playeras</a>
                    <a href="../pantalonetas/pantalonetas.html">Pantalonetas</a>
                    <a href="pants.html">Pants</a>
                    <a href="../zapatos/z.html">Zapatos</a>
            </nav>
        </div>
    </header>
	<main>
		<section class="carousel-container">
			<h2 style="text-align: center; margin-bottom: 30px; font-size: 28px;">Productos Destacados</h2>
			<div class="carousel-track" id="carouselTrack"></div>
			<button class="btn-carousel btn-prev" onclick="moverCarrusel(-1)">❮</button>
			<button class="btn-carousel btn-next" onclick="moverCarrusel(1)">❯</button>
		</section>
		<a href="../carrito/carrito.html" id="carrito-btn">🛒 Ver Carrito</a>
		<h2 style="text-align:center;">Pants y Joggers</h2>
		<div class="productos-grid" id="contenedor-productos"></div>

		<div id="modal" class="modal">
			<div class="modal-content">
				<img id="modal-imagen" src="" width="200" height="200">
				<h3 id="modal-nombre"></h3>
				<p><strong>Precio:</strong> Q<span id="modal-precio"></span></p>
				<p><strong>Marca:</strong> <span id="modal-marca"></span></p>
				<p><strong>Código:</strong> <span id="modal-codigo"></span></p>
				<p><strong>Descripción:</strong> <span id="modal-descripcion"></span></p>
				<p><strong>Talla:</strong> <span id="modal-talla"></span></p>
				<p><strong>Color:</strong> <span id="modal-color"></span></p>
				<label>Cantidad:</label>
				<input type="number" id="modal-cantidad" value="1" min="1">
				<br><br>
				<div class="modal-botones">
					<button id="btn-comprar-modal" style="background:green; color:white; padding:10px; border:none;">Comprar</button>
					<button id="btn-cerrar-modal" style="background:red; color:white; padding:10px; border:none;">Cerrar</button>
				</div>
			</div>
		</div>
	</main>
    <footer>
        <p>&copy; 2024 Tienda Champion. Todos los derechos reservados.</p>
    </footer>
    <script src="pants.js"></script>
	<script src="carrusel.js"></script>
</body>
</html>
